<!DOCTYPE html>
<html lang="ru">
<head>
  <script>
    /* Корректные пути к CSS/JS: сервер, Vercel и file:// */
    (function () {
      var href = location.href.split('#')[0].split('?')[0];
      if (!/\.html?$/i.test(href) && !href.endsWith('/')) href += '/';
      else if (/\.html?$/i.test(href)) href = href.replace(/[^/]+$/, '');
      var b = document.createElement('base');
      b.href = href;
      var head = document.documentElement.querySelector('head') || document.head;
      if (head) head.insertBefore(b, head.firstChild);
    })();
  </script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-чат с репетитором — Собери100</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/app.css">
<link rel="stylesheet" href="css/chat.css">
</head>
<body>

<nav class="nav">
  <div class="container">
    <a href="index.html" class="brand">
      <svg class="ring-mini" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="13" stroke="url(#g1)" stroke-width="4"/><defs><linearGradient id="g1" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#4C6FFF"/><stop offset="1" stop-color="#8B5CF6"/></linearGradient></defs></svg>
      Собери100
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Главная</a></li>
      <li><a href="dashboard.html">Кабинет</a></li>
      <li><a href="chat.html" class="active">AI-чат</a></li>
      <li><a href="plan.html">План</a></li>
      <li><a href="solve.html">Решение задач</a></li>
    </ul>
    <div class="nav-actions">
      <button class="theme-toggle" aria-label="Переключить тему"></button>
      <button class="nav-burger" aria-label="Меню" aria-expanded="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
    </div>
  </div>
</nav>

<main class="container page-wrap chat-page">

  <div class="chat-layout">
    <aside class="card chat-sidebar reveal">
      <div class="section-label">Предмет</div>
      <select id="subject-select" class="select-field"></select>

      <div class="section-label" style="margin-top:24px;">Быстрые запросы</div>
      <div class="suggestion-list" id="suggestion-list"></div>

      <div class="section-label" style="margin-top:24px;">Прогресс</div>
      <div id="sidebar-progress" class="sidebar-progress"></div>
    </aside>

    <section class="card chat-window reveal reveal-delay-1">
      <div class="chat-window-head">
        <div>
          <h2 id="chat-subject-title">AI-репетитор</h2>
          <p class="chat-status"><span class="dot"></span> на связи</p>
        </div>
        <button id="clear-chat" class="btn btn-ghost btn-sm">Очистить чат</button>
      </div>

      <div id="chat-log" class="chat-log" role="log" aria-live="polite"></div>

      <form id="chat-form" class="chat-input-row">
        <textarea id="chat-input" rows="1" placeholder="Например: «Объясни производные» или «Реши задачу №345»" required></textarea>
        <button type="submit" class="btn btn-primary chat-send-btn" aria-label="Отправить">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 3 18 9-18 9 4-9-4-9Z"/></svg>
        </button>
      </form>
    </section>
  </div>

</main>

<script src="js/store.js"></script>
<script src="js/main.js"></script>
<script src="js/ai-engine.js"></script>
<script src="js/chat.js"></script>
</body>
</html>
