<!DOCTYPE html>
<html lang="ru">
<head>
  <script>
    /* Корректные пути к CSS/JS: сервер, Vercel и file:// */
    (function () {
      var href = location.href.split('#')[0].split('?')[0];
      if (!/\.html?$/i.test(href) && !href.endsWith('/')) href += '/';
      else if (/\.html?$/i.test(href)) href = href.replace(/[^/]+$/, '');
      var b = document.createElement('base');
      b.href = href;
      var head = document.documentElement.querySelector('head') || document.head;
      if (head) head.insertBefore(b, head.firstChild);
    })();
  </script>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Котодом — доска объявлений о домашних животных. Кошки, собаки, грызуны и другие питомцы.">
  <meta name="theme-color" content="#f97316">
  <title>Котодом — объявления о питомцах</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent: { DEFAULT: '#f97316', hover: '#ea580c', light: '#fff7ed' }
          }
        }
      }
    }
  </script>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen pb-20 md:pb-0">

  <!-- Шапка -->
  <div id="app-header"></div>

  <!-- Основной контент — все разделы -->
  <main id="app-main">
    <div id="view-home" class="view"></div>
    <div id="view-catalog" class="view"></div>
    <div id="view-listing" class="view"></div>
    <div id="view-post" class="view"></div>
    <div id="view-profile" class="view"></div>
    <div id="view-favorites" class="view"></div>
  </main>

  <!-- Нижняя навигация (мобильная) -->
  <div id="app-bottom-nav"></div>

  <!-- Модальное окно: галерея фото -->
  <div id="photo-modal" class="hidden fixed inset-0 z-[60]">
    <div class="modal-overlay absolute inset-0 bg-black/90 flex items-center justify-center p-4">
      <button id="photo-close" class="absolute top-4 right-4 z-10 w-10 h-10 bg-white/10 hover:bg-white/20 rounded-full flex items-center justify-center text-white transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
      <button id="photo-prev" class="absolute left-4 z-10 w-10 h-10 bg-white/10 hover:bg-white/20 rounded-full flex items-center justify-center text-white transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <img id="photo-modal-img" src="" alt="" class="modal-content max-h-[85vh] max-w-full object-contain rounded-lg">
      <button id="photo-next" class="absolute right-4 z-10 w-10 h-10 bg-white/10 hover:bg-white/20 rounded-full flex items-center justify-center text-white transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </button>
      <span id="photo-modal-counter" class="absolute bottom-4 left-1/2 -translate-x-1/2 text-white/70 text-sm"></span>
    </div>
  </div>

  <!-- Модальное окно: чат -->
  <div id="chat-modal" class="hidden fixed inset-0 z-[60]">
    <div id="chat-overlay" class="modal-overlay absolute inset-0 bg-black/50 flex items-end sm:items-center justify-center p-0 sm:p-4">
      <div class="modal-content bg-white dark:bg-gray-900 w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl flex flex-col max-h-[85vh] sm:max-h-[70vh]">
        <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-700">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-orange-100 dark:bg-orange-900/30 rounded-full flex items-center justify-center">👤</div>
            <div>
              <p id="chat-seller-name" class="font-semibold dark:text-white">Продавец</p>
              <p class="text-xs text-green-500">Онлайн</p>
            </div>
          </div>
          <button id="chat-close" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800">
            <svg class="w-5 h-5 dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>

        <div id="chat-messages" class="chat-messages flex-1 overflow-y-auto p-4 space-y-1"></div>

        <form id="chat-form" class="p-4 border-t border-gray-200 dark:border-gray-700 flex gap-2">
          <input type="text" id="chat-input" placeholder="Напишите сообщение..." autocomplete="off"
            class="flex-1 px-4 py-2.5 rounded-xl bg-gray-100 dark:bg-gray-800 border-0 text-sm dark:text-white focus:ring-2 focus:ring-orange-500">
          <button type="submit" class="px-4 py-2.5 bg-orange-500 hover:bg-orange-600 text-white rounded-xl transition shrink-0">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Скрипты -->
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/components.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
